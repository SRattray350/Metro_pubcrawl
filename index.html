
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Metro Map Coordinate Recorder</title>

<style>

body{
margin:0;
font-family:system-ui,Segoe UI,Roboto;
background:#0f172a;
color:white;
}

.wrap{
width:95%;
max-width:1400px;
margin:auto;
padding:20px;
}

h1{
margin-top:0;
}

.map-shell{
position:relative;
border-radius:12px;
overflow:hidden;
background:white;
cursor:crosshair;
}

.map-shell img{
width:100%;
display:block;
pointer-events:none;
}

.map-overlay{
position:absolute;
inset:0;
}

.temp-point{
position:absolute;
width:12px;
height:12px;
border-radius:50%;
background:#ef4444;
border:2px solid white;
transform:translate(-50%,-50%);
pointer-events:none;
}

.recorder-panel{
position:fixed;
right:20px;
bottom:20px;
width:340px;
background:#111827;
border:1px solid rgba(255,255,255,0.15);
border-radius:12px;
padding:15px;
box-shadow:0 15px 35px rgba(0,0,0,0.4);
z-index:9999;
}

.recorder-panel h3{
margin-top:0;
}

input,textarea,button{
width:100%;
margin-top:8px;
padding:10px;
border-radius:8px;
border:none;
font-size:14px;
}

input,textarea{
background:#1f2937;
color:white;
}

textarea{
height:140px;
resize:none;
}

button{
background:#22c55e;
color:white;
font-weight:bold;
cursor:pointer;
}

button.secondary{
background:#374151;
}

.recorder-buttons{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
margin-top:8px;
}

</style>
</head>

<body>

<div class="wrap">

<h1>Metro Stop Coordinate Recorder</h1>

<p>
Enter a station name then click the map to record its coordinates.
</p>

<div class="map-shell">

<img src="https://www.nexus.org.uk/themes/custom/nexus/images/metro-map-large.jpg">

<div id="mapOverlay" class="map-overlay"></div>

</div>

</div>


<div class="recorder-panel">

<h3>Coordinate Recorder</h3>

<input id="stationName" placeholder="Station name">

<textarea id="output" placeholder="Recorded coordinates will appear here"></textarea>

<div class="recorder-buttons">
<button id="copyBtn">Copy Output</button>
<button id="clearBtn" class="secondary">Clear</button>
</div>

</div>

<script>

const mapOverlay = document.getElementById("mapOverlay")
const stationNameInput = document.getElementById("stationName")
const outputBox = document.getElementById("output")

mapOverlay.addEventListener("click",function(e){

const name = stationNameInput.value.trim()

if(!name) return

const rect = mapOverlay.getBoundingClientRect()

const x = ((e.clientX-rect.left)/rect.width)*100
const y = ((e.clientY-rect.top)/rect.height)*100

const xr = Number(x.toFixed(2))
const yr = Number(y.toFixed(2))

const line = `{ name: "${name}", x: ${xr}, y: ${yr} },`

console.log(line)

if(outputBox.value)
outputBox.value += "\n"

outputBox.value += line

const point = document.createElement("div")

point.className="temp-point"
point.style.left = xr+"%"
point.style.top = yr+"%"

mapOverlay.appendChild(point)

})

document.getElementById("copyBtn").onclick=function(){

navigator.clipboard.writeText(outputBox.value)

}

document.getElementById("clearBtn").onclick=function(){

outputBox.value=""
document.querySelectorAll(".temp-point").forEach(p=>p.remove())

}

document.addEventListener("keydown",function(e){

if(e.key==="n"){

const name = prompt("Station name")

if(name)
stationNameInput.value=name

}

})

</script>

</body>
</html>
